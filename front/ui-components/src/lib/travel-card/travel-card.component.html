<div class="relative w-full max-w-sm rounded-2xl bg-surface-glass backdrop-blur-md border border-white/20 shadow-glass overflow-hidden transition-transform duration-300 hover:-translate-y-1 hover:shadow-soft">
  
  <!-- Image Header (Gradient Placeholder) -->
  <div class="h-32 w-full bg-gradient-to-br from-brand-dark to-brand relative">
    <div class="absolute inset-0 bg-black/10"></div>
    <!-- Destination Badge -->
    <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-4 py-1.5 rounded-full text-brand-dark text-sm font-semibold shadow-sm flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-brand-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      {{ destination() }}
    </div>
  </div>

  <!-- Card Body -->
  <div class="p-5 pt-12 relative bg-white/80">
    <!-- User Avatar - Absolute positioned overlapping header -->
    <div class="absolute -top-10 left-5">
      <img [src]="userAvatar()" [alt]="userName()" class="w-20 h-20 rounded-full border-4 border-white shadow-md object-cover bg-gray-100">
    </div>
    
    <!-- User Name & Match Button Container -->
    <div class="flex justify-between items-end mb-4">
      <div class="pt-2">
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Yol Arkadaşı</p>
        <h3 class="text-xl font-bold text-brand-dark leading-none">{{ userName() }}</h3>
      </div>
      
      <button 
        (click)="onMatchClick()"
        class="bg-brand-accent hover:bg-brand-accentLight text-white font-bold py-2.5 px-6 rounded-full shadow-[0_4px_14px_0_rgba(245,158,11,0.39)] transition-all duration-200 hover:shadow-[0_6px_20px_rgba(245,158,11,0.23)] active:scale-95 focus:outline-none">
        Eşleş
      </button>
    </div>

    <!-- Details Grid -->
    <div class="grid grid-cols-2 gap-3 mt-6">
      <div class="flex flex-col bg-gray-50/70 p-3.5 rounded-xl border border-gray-100/50">
        <div class="flex items-center gap-1.5 text-gray-400 mb-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span class="text-[11px] font-semibold uppercase tracking-wider">Tarih</span>
        </div>
        <span class="text-sm font-semibold text-brand-dark">
          {{ startDate() | date:'dd MMM' }} - {{ endDate() | date:'dd MMM' }}
        </span>
      </div>
      
      <div class="flex flex-col bg-gray-50/70 p-3.5 rounded-xl border border-gray-100/50">
        <div class="flex items-center gap-1.5 text-gray-400 mb-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="text-[11px] font-semibold uppercase tracking-wider">Bütçe</span>
        </div>
        <span class="text-sm font-semibold text-brand-dark">{{ budget() }}</span>
      </div>
    </div>

  </div>
</div>
